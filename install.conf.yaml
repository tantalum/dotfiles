- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.tmux.conf: tmux.conf
    ~/.vimrc: vimrc
    ~/.alias: alias
    ~/.gvimrc: gvimrc
    ~/.zshrc: zshrc
    ~/.bashrc: bashrc
    ~/.config/nvim/init.vim: vimrc

- shell:
  - [git submodule update --init --recursive, Installing submodules]
